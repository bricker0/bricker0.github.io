<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Leaflet Image Compare</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }

    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: white;
      padding: 10px;
      border-radius: 6px;
      font-family: sans-serif;
    }
  </style>
</head>

<body>
<div id="map"></div>

<div class="controls">
  <label><input type="checkbox" id="img1" checked> 2017 mean NDVI</label><br>
  <label><input type="checkbox" id="img2" > 2017 true color</label><br>
  <label><input type="checkbox" id="img3" checked> 2025 mean NDVI</label><br>
  <label><input type="checkbox" id="img4" > 2025 true color</label><br>
   <label><input type="checkbox" id="img5"> Change between 2017 -2025</label><br>
  <button id="swipeBtn">Toggle to Compare</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Side-by-side plugin -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-side-by-side/2.0.0/leaflet-side-by-side.min.js"></script>

<script>




  // --- Map setup ---
  const map = L.map('map').setView([-2.95, 25.9], 10);

  L.tileLayer('  https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
    attribution: '&copy; Google Satellite'
  }).addTo(map);
  
 
  // --- Bounds from your coordinates ---
  const bounds = [
    [-3.088946936, 25.749668630], // SW
    [-2.811098019, 26.103515021]  // NE
  ];

  // --- Image overlays (replace with your files) ---
  const img1 = L.imageOverlay('images/congo_NDVI_2017.png', bounds, { opacity: 0.7 }).addTo(map);
  
  const img2 = L.imageOverlay('images/congo_RGB_2017.png', bounds, { opacity: 0.7 }).addTo(map);
  const img3 = L.imageOverlay('images/congo_NDVI_2025.png', bounds, { opacity: 0.7 }).addTo(map);

  const img4 = L.imageOverlay('images/congo_RGB_2025.png', bounds, { opacity: 0.7 }).addTo(map);
  const img5 = L.imageOverlay('images/congo_change_17-25.png', bounds, { opacity: 0.7 }).addTo(map);

  map.fitBounds(bounds);

  // --- Toggle visibility ---
  document.getElementById('img1').addEventListener('change', (e) => {
    if (e.target.checked) map.addLayer(img1);
    else map.removeLayer(img1);
  });


  document.getElementById('img2').addEventListener('change', (e) => {
    if (e.target.checked) map.addLayer(img2);
    else map.removeLayer(img2);
  });

  document.getElementById('img3').addEventListener('change', (e) => {
    if (e.target.checked) map.addLayer(img3);
    else map.removeLayer(img3);
  });


  document.getElementById('img4').addEventListener('change', (e) => {
    if (e.target.checked) map.addLayer(img4);
    else map.removeLayer(img4);
  });
  
   document.getElementById('img5').addEventListener('change', (e) => {
    if (e.target.checked) map.addLayer(img5);
    else map.removeLayer(img5);
  });



  // --- Swipe compare ---
  let sideBySide = null;
  let swipeEnabled = false;

  document.getElementById('swipeBtn').addEventListener('click', () => {
    if (!swipeEnabled) {
      sideBySide = L.control.sideBySide(img1, img3).addTo(map);
      swipeEnabled = true;
    } else {
      map.removeControl(sideBySide);
      sideBySide = null;
      swipeEnabled = false;
    }
  });
  

  
</script>
</body>
</html>
